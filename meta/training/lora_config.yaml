# LoRA + SFT hyperparameters for Phase 1 (generator warm-start) and Phase 2 (proposer).
# Single LoRA shared between roles -- both gradients hit the same θ.
# Targets and rank follow the canonical Qwen3 fine-tuning recipe; see also D6 in the
# project plan at http://10.8.161.234:8080/#sec-decisions-tier1

model:
  base_id: "Qwen/Qwen3.5-4B"
  dtype:   "bfloat16"
  attn_implementation: "sdpa"   # flash_attn install pending; SDPA is the safe default
  use_liger: false              # legacy direct-wrapper path; we use TRL-integrated path instead

lora:
  r:                32
  lora_alpha:       64
  lora_dropout:     0.05
  bias:             "none"
  task_type:        "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir:                 "./meta/training/checkpoints/phase1_v0"
  num_train_epochs:           3                 # 17 trajs is small; allow several epochs
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8                # 17 / 8 ≈ 2 grad updates per epoch
  gradient_checkpointing:      true
  learning_rate:               1.0e-4
  lr_scheduler_type:           "cosine"
  warmup_ratio:                0.03
  weight_decay:                0.0
  max_grad_norm:               1.0
  logging_steps:               1
  save_steps:                  20
  save_total_limit:            2
  bf16:                        true
  optim:                       "adamw_torch"
  packing:                     false             # disabled until flash_attn installed (SDPA cross-contamination risk)
  assistant_only_loss:         true              # D7 prompt-masked; template patched in sft_generator.py
  max_length:                  65536             # max trajectory = 33,509 tokens (moto-5794); 64K leaves headroom and avoids truncating the submission turn
  use_liger_kernel:            true              # TRL-integrated; removes logits materialization (vocab=248K × seq=64K)
  # If 64K OOMs, accelerate launcher with deepspeed_z3_offload.yaml takes over.

data:
  # Phase 1: self-bootstrap from passing v1+v2 trajectories of mini-swe-agent + Qwen3.5-4B
  trajectory_dirs:
    - "/home/t-hyunlee/meta-harness-plan/results/phase0/0_50"
    - "/home/t-hyunlee/meta-harness-plan/results/phase0/0_50_ctx128k"
  scores_paths:
    - "/home/t-hyunlee/meta-harness-plan/results/phase0/0_50_scores.json"
    - "/home/t-hyunlee/meta-harness-plan/results/phase0/0_50_ctx128k_scores.json"
  # Future: Phase 2 also reads "proposer_pool.jsonl" with (parent, child, ΔScore) tuples
  output_jsonl:                "./meta/training/data/phase1_generator.jsonl"
  drop_empty_assistant: true
